# ============================================================
# Cinematic restoration pipeline — Apple Silicon / mpv
# Goal: clean compression artifacts, keep grain, no painterly AI look
# ============================================================

vo=gpu-next
gpu-api=vulkan
hwdec=auto-safe
profile=gpu-hq

# --- Compression banding (DCT banding from low-bitrate sources) ---
# Adds dithered noise that breaks up flat gradients without smearing detail.
deband=yes
deband-iterations=2
deband-threshold=24
deband-range=16
deband-grain=10

# --- Restoration shader chain --------------------------------
# 1. KrigBilateral  → luma-guided chroma upscale; kills chroma
#                     blockiness & ringing typical of low-bitrate sources.
# 2. nlmeans_light  → gentle non-local-means denoise; removes mosquito
#                     noise / edge ringing while leaving real film grain.
# 3. ravu-lite-r4   → small learned luma upscaler that reconstructs,
#                     does not hallucinate (no "AI painterly" look).
# 4. SSimSuperRes   → perceptual detail rebalance after upscale;
#                     restores micro-contrast without sharpening halos.
# 5. SSimDownscaler → high-quality downscale for >display sources.
glsl-shaders="~~/shaders/KrigBilateral.glsl"
glsl-shaders-append="~~/shaders/nlmeans_light.glsl"
glsl-shaders-append="~~/shaders/ravu-lite-r4.hook"
glsl-shaders-append="~~/shaders/SSimSuperRes.glsl"
glsl-shaders-append="~~/shaders/SSimDownscaler.glsl"

# --- Scaling kernels -----------------------------------------
scale=ewa_lanczos
cscale=mitchell
dscale=mitchell
sigmoid-upscaling=yes
linear-downscaling=no

# --- Temporal stability --------------------------------------
# Display-resampled interpolation smooths judder without
# introducing soap-opera motion.
video-sync=display-resample
interpolation=yes
tscale=oversample

# --- Dither: keep grain texture preserved through 10-bit pipe -
dither-depth=auto
dither=fruit

# ============================================================
# Heavy-restoration profile (very damaged / heavily compressed)
# Activate:  mpv --profile=restore-heavy file.mkv
# ============================================================
[restore-heavy]
profile-desc=Strong denoise + temporal stabilization
glsl-shaders-clr=yes
glsl-shaders="~~/shaders/KrigBilateral.glsl"
glsl-shaders-append="~~/shaders/nlmeans.glsl"
glsl-shaders-append="~~/shaders/nlmeans_temporal.glsl"
glsl-shaders-append="~~/shaders/ravu-lite-r4.hook"
glsl-shaders-append="~~/shaders/SSimSuperRes.glsl"

# ============================================================
# Light profile (modern well-encoded sources — skip denoise)
# Activate:  mpv --profile=restore-light file.mkv
# ============================================================
[restore-light]
profile-desc=Upscale-only, no denoise
glsl-shaders-clr=yes
glsl-shaders="~~/shaders/KrigBilateral.glsl"
glsl-shaders-append="~~/shaders/ravu-lite-r4.hook"
glsl-shaders-append="~~/shaders/SSimSuperRes.glsl"
